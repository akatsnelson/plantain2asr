site_name: plantain2asr
site_description: Benchmarking and analysis framework for Russian ASR models
site_url: https://akatsnelson.github.io/plantain2asr
repo_url: https://github.com/akatsnelson/plantain2asr
repo_name: plantain2asr

theme:
  name: material
  palette:
    - scheme: default
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - announce.dismiss
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: ru
          name: Русский
          build: true
          nav_translations:
            Home: Главная
            Quick Start: Быстрый старт
            API Reference: Справочник API
            Datasets: Датасеты
            Models: Модели
            Metrics: Метрики
            Normalization: Нормализация
            Reporting: Отчёты
            Analysis: Анализ
            Extending: Расширение
            Overview: Обзор
            Custom Normalizer: Свой нормализатор
            Custom Model: Своя модель
            Custom Metric: Своя метрика
            Custom Report Section: Своя вкладка отчёта

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - API Reference:
      - Datasets: api/dataloaders.md
      - Models: api/models.md
      - Metrics: api/metrics.md
      - Normalization: api/normalization.md
      - Reporting: api/reporting.md
      - Analysis: api/analysis.md
  - Extending:
      - Overview: extending/index.md
      - Custom Normalizer: extending/custom_normalizer.md
      - Custom Model: extending/custom_model.md
      - Custom Metric: extending/custom_metric.md
      - Custom Report Section: extending/custom_section.md
