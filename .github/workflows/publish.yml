name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-publish:
    name: Build and publish Python package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for Trusted Publisher (OIDC)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install build twine pytest -r docs/requirements.txt

      - name: Build package
        run: python -m build

      - name: Validate package metadata
        run: twine check dist/*

      - name: Install built wheel and run core smoke tests
        run: python -m pip install dist/*.whl pytest && python -m pytest -m core

      - name: Build docs in strict mode
        run: mkdocs build --strict

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: false
