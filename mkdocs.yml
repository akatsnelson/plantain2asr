site_name: plantain2asr
site_description: Benchmarking and analysis framework for Russian ASR models
site_url: https://akatsnelson.github.io/plantain2asr
repo_url: https://github.com/akatsnelson/plantain2asr
repo_name: plantain2asr

theme:
  name: material
  palette:
    - scheme: default
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - API Reference:
      - Datasets: api/dataloaders.md
      - Models: api/models.md
      - Metrics: api/metrics.md
      - Normalization: api/normalization.md
      - Reporting: api/reporting.md
      - Analysis: api/analysis.md
  - Extending:
      - Overview: extending/index.md
      - Custom Normalizer: extending/custom_normalizer.md
      - Custom Model: extending/custom_model.md
      - Custom Metric: extending/custom_metric.md
      - Custom Report Section: extending/custom_section.md
