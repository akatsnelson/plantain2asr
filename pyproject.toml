[project.urls]
Homepage = "https://github.com/akatsnelson/plantain2asr"
Documentation = "https://akatsnelson.github.io/plantain2asr"
Issues = "https://github.com/akatsnelson/plantain2asr/issues"

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "core: lightweight package smoke tests",
    "tone: T-One backend tests",
    "gigaam: GigaAM backend tests",
    "whisper: Whisper backend tests",
    "vosk: Vosk backend tests",
    "train: train-module smoke tests",
    "integration: multi-model pipeline tests",
]

# Package discovery is handled by setup.py (needed due to non-standard layout
# where the git repo root itself is the plantain2asr package directory)
